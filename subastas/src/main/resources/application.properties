spring.application.name=subastas

# Render inyecta su propia variable PORT y la app tiene que escuchar ahi -- por eso el
# default 8080 solo se usa en local (cuando PORT no esta seteado).
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres?ssl=true&sslfactory=org.postgresql.ssl.NonValidatingFactory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.vxtrsfxfxxhcouhizkhg}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
server.error.include-message=always
logging.level.org.springframework.security=DEBUG
jwt.secret=${JWT_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:subastas.noreply@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
